<main class="container mt-4">

  @if (orders.length > 0) {

    <section class="row gy-4">

      @for (order of orders; track order.id) {
        <app-order [order]="order"/>
      }

    </section>

  } @else {

    <footer class="text-center py-5">
      <i class="bi bi-bag display-3 text-muted mb-3"></i>
      <p class="text-muted fs-4">No orders yet</p>
    </footer>

  }

</main>
