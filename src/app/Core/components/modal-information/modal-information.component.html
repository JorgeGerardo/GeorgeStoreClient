<main class="modal-body text-center p-4">

  <!-- Icon -->
  <section class="mb-3">
    @switch (type) {
      @case ('error') {
        <div class="icon-circle bg-danger-subtle text-danger">
          <i class="bi bi-x-lg"></i>
        </div>
      }
      @case ('success') {
        <div class="icon-circle bg-success-subtle text-success">
          <i class="bi bi-check-lg"></i>
        </div>
      }
      @case ('info') {
        <div class="icon-circle bg-primary-subtle text-primary">
          <i class="bi bi-info-lg"></i>
        </div>
      }
    }
  </section>

  <p class="mb-4 fs-5 fw-semibold text-dark">
    {{ message }}
  </p>

  <button class="btn btn-primary px-4 rounded-pill" (click)="close()">
    Accept
  </button>

</main>
