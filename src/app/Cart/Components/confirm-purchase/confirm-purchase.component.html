<app-navbar />
<main class="container mt-4">
  @if (cart) {
    <h2 class="mb-4">
      <i class="bi bi-cart3 me-2"></i>
      Shopping Cart
    </h2>

    <app-address-selection 
        (selectedEvent)="selectAddress($event)" 
        [addresses]="this.addresses" 
    />

    <app-payment-method-selection 
        (selectedEvent)="selectPaymentMethod($event)" 
        [paymentMethods]="this.paymentMethods"
    />

    <footer class="row">
        <div class="col-lg-8">
            @for (item of cart.items; track item.id) {
                <app-cart-detail-summary [item]="item"/>
            }
        </div>

        <!-- SUMMARY -->
        <section class="col-lg-4">
            <article class="card shadow-sm">
                <main class="card-body">
                    <h5 class="card-title mb-3">SUMMARY</h5>

                    <div class="d-flex justify-content-between mb-2">
                    <span>Total</span>
                    <strong>${{ cart.total }}</strong>
                    </div>

                    <button (click)="purchase()" [disabled]="!selectedAddressId || !selectedPaymentMethodId" class="btn btn-primary w-100 mt-3">
                        <i class="bi bi-credit-card me-2"></i>
                        Purchase
                    </button>
                </main>
            </article>
        </section>
    </footer>
    
  } 
</main>
