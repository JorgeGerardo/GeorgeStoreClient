<main class="container mt-3">
    @if (addresses.length > 0) {
      <section class="row g-3">
        @for (address of addresses; track address.id) {
          <app-address [address]="address" (deletedEvent)="remove($event)"/>
        }
      </section>
    }
    @else { <app-no-address-registered/> }
</main>
