<main class="profile-container d-flex flex-column align-items-center">

  <section class="profile-card text-center p-4 mb-4">

    <div class="avatar mb-3">
      <i class="bi bi-person-fill"></i>
    </div>

    <h4 class="fw-semibold mb-1">
      {{ userData?.userName || 'Usuario' }}
    </h4>

    <p class="text-muted mb-0">
      {{ userData?.email || 'correo@ejemplo.com' }}
    </p>

    <p class="text-muted mb-0">
      Fecha de registro: {{ userData?.dateRegister | date:'d/M/yyyy' }}
    </p>

  </section>

  <section class="profile-options px-3">
    <div class="options-container">

      <div class="option-card">
        <i class="bi bi-bag"></i>
        <span>Orders</span>
      </div>

      <div class="option-card" routerLink="/profile/address">
        <i class="bi bi-geo-alt"></i>
        <a ></a>
        <span>Address</span>
      </div>

      <div class="option-card">
        <i class="bi bi-credit-card"></i>
        <span>Payment methods</span>
      </div>

    </div>
  </section>

</main>
