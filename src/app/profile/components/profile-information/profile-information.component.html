<main class="profile-container d-flex justify-content-center align-items-center">
  <section class="profile-card text-center p-4">

    <div class="avatar mb-3">
      <i class="bi bi-person-fill"></i>
    </div>

    <h4 class="fw-semibold mb-1">
      {{ userData?.userName || 'Usuario' }}
    </h4>

    <p class="text-muted mb-0">
      {{ userData?.email || 'correo@ejemplo.com' }}
    </p>

    <p class="text-muted mb-0">
    Fecha de registro: {{ userData?.dateRegister | date:'d/M/yyyy' }}
    </p>

  </section>
</main>
