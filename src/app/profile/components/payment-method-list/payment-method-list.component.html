<main class="container mt-4">

    @if (paymentMethods.length > 0) {
        <article class="row gy-3">
            @for (pm of paymentMethods; track pm.id) {
                <app-payment-method-card 
                    [paymentMethod]="pm" 
                    (deleteEvent)="delete(pm.id)" 
                    (setDefault)="setAsDefault(pm.id)"
                />
            }
        </article>
    }@else {
        <section class="d-flex flex-column align-items-center justify-content-center text-center py-5">
            <i class="bi bi-credit-card display-4 text-muted mb-3"></i>
            <p class="text-muted fs-5">No payment methods registered</p>
            <a 
                routerLink="/profile/payment-methods/create"
                class="btn btn-primary px-4 d-flex align-items-center gap-2">
                Add new method
            </a>
        </section>
    }


    @if(paymentMethods.length > 0 && paymentMethods.length < 10){
        <section class="d-flex flex-column align-items-center justify-content-center text-center py-5">
        <i class="bi bi-credit-card display-4 text-muted mb-3"></i>
        <a 
            routerLink="/profile/payment-methods/create"
            class="btn btn-primary px-4 d-flex align-items-center gap-2">
            Add new method
        </a>

        </section>

    }


</main>
